name: Load Today's Free NFL Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update rankings
        run: node scripts/update-rankings.cjs

      - name: Commit updated rankings
        run: |
          git config user.name "shua-rank-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rankings-live.json ranking-history.json
          git diff --cached --quiet || git commit -m "Load current NFL data"
          git push
